<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geospatial Navigation Engine Pro v10.3</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-dark: #020408;
            --card-bg: rgba(15, 22, 38, 0.95);
            --primary: #06b6d4;
            --primary-hover: #0891b2;
            --accent: #f59e0b;
            --success: #10b981;
            --error: #ef4444;
            --text-light: #f1f5f9;
            --border-color: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        html, body { width: 100%; height: 100%; background-color: var(--bg-dark); color: var(--text-light); overflow: hidden; }
        
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        .toggle-menu-btn {
            position: absolute; top: 15px; right: 15px; z-index: 100;
            background: var(--primary); color: #000; font-weight: bold;
            padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: block; width: auto;
        }

        .hud-overlay {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            width: 340px; max-height: calc(100% - 30px);
            background: var(--card-bg); border: 1px solid var(--border-color);
            backdrop-filter: blur(12px); border-radius: 12px; padding: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); overflow-y: auto;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        @media (max-width: 768px) {
            .hud-overlay {
                width: calc(100% - 30px);
                transform: translateY(-120%);
                opacity: 0;
            }
            .hud-overlay.active {
                transform: translateY(0);
                opacity: 1;
                z-index: 90;
            }
        }

        .hud-header { border-bottom: 1px solid var(--border-color); padding-bottom: 8px; margin-bottom: 12px; }
        .hud-header h1 { font-size: 1.15rem; color: var(--primary); }
        
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .input-block label { display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 2px; }
        .input-block input, .input-block select { width: 100%; padding: 6px; background: #05070f; border: 1px solid var(--border-color); border-radius: 4px; color: white; font-size: 0.8rem; }
        
        .full-width-input { grid-column: span 2; }

        button { padding: 8px 12px; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-top: 5px; width: 100%; }
        button:hover { background: var(--primary-hover); }
        .btn-split { display: flex; gap: 5px; }
        .btn-split button { margin-top: 0; }

        .telemetry-board {
            background: rgba(5, 7, 15, 0.6); padding: 10px; border-radius: 6px;
            border: 1px solid var(--border-color); margin-top: 10px; font-size: 0.8rem;
        }
        .telemetry-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .telemetry-row span:last-child { color: var(--accent); font-weight: bold; }

        .kml-list { max-height: 100px; overflow-y: auto; background: #05070f; border-radius: 4px; margin-top: 8px; border: 1px solid var(--border-color); }
        .kml-node-item { padding: 6px; font-size: 0.75rem; border-bottom: 1px solid #1e293b; cursor: pointer; display: flex; justify-content: space-between; }
        .kml-node-item:hover { background: var(--border-color); color: var(--primary); }

        @keyframes pulse {
            0% { transform: scale(0.6); opacity: 0.8; }
            100% { transform: scale(2.2); opacity: 0; }
        }
        .gps-pulse {
            width: 14px; height: 14px; background: #ec4899; border-radius: 50%;
            position: relative; box-shadow: 0 0 8px #ec4899;
        }
        .gps-pulse::after {
            content: ''; width: 14px; height: 14px; background: #ec4899; border-radius: 50%;
            position: absolute; top:0; left:0; animation: pulse 1.8s infinite ease-out;
        }
    </style>
</head>
<body>

    <button class="toggle-menu-btn" onclick="toggleHUDMenu()">⚙️ Menu</button>

    <div class="hud-overlay" id="hudMenu">
        <div class="hud-header">
            <h1>Geospatial Tactical Canvas</h1>
            <span style="font-size:0.7rem; color:#64748b;">Advanced Grid Engine v10.3</span>
        </div>

        <div class="input-group">
            <div class="input-block full-width-input">
                <label>Target Field Identifier Name</label>
                <input type="text" id="geo-name" value="Selected Spot">
            </div>
            <div class="input-block">
                <label>Latitude (پانی)</label>
                <input type="number" id="geo-lat" value="36.1912" step="0.0001">
            </div>
            <div class="input-block">
                <label>Longitude (درێژی)</label>
                <input type="number" id="geo-lng" value="44.0091" step="0.0001">
            </div>
            <div class="input-block">
                <label>Travel Mode</label>
                <select id="travel-mode">
                    <option value="driving">🚗 Driving (سەیارە)</option>
                    <option value="walking">🚶 Walking (بەپێ)</option>
                </select>
            </div>
            <div class="input-block">
                <label>Map Lens Layer</label>
                <select id="layer-select" onchange="alterMapLens()">
                    <option value="hybrid">Ultra Sat Hybrid</option>
                    <option value="streets">Standard Roads</option>
                    <option value="dark">Tactical Dark</option>
                </select>
            </div>
        </div>

        <button style="background: #ec4899; color: white;" onclick="captureMyLocation()">📍 Sync My Location GPS</button>
        <button style="background: var(--success); color: white;" onclick="triggerNavigationExecution()">🚗 Exec Routing & Fly</button>
        
        <div class="btn-split">
            <div style="position: relative; overflow: hidden; width:50%;">
                <button style="background: #8b5cf6; color: white;">📂 Ingest KML</button>
                <input type="file" id="kml-file" accept=".kml" onchange="parseBulkKML(event)" style="font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; width: 100%;">
            </div>
            <button style="background: #a855f7; color: white; width:50%;" onclick="exportBulkKML()">Export KML</button>
        </div>

        <div class="telemetry-board">
            <div class="telemetry-row"><span>Status:</span><span id="tel-status" style="color:var(--primary);">Online</span></div>
            <div class="telemetry-row"><span>Distance:</span><span id="tel-distance">0.00 KM</span></div>
            <div class="telemetry-row"><span>ETA (کاتی گەیشتن):</span><span id="tel-eta">0 Mins</span></div>
            <div class="telemetry-row"><span>Heading:</span><span id="tel-bearing">0° Vector</span></div>
        </div>

        <div style="margin-top:10px; display:flex; gap:4px;">
            <button style="background:#ef4444; color:white; font-size:11px;" onclick="wipeCanvas()">🗑️ Clear Map Paths</button>
        </div>

        <div class="kml-list" id="kml-list-box" style="display:none;">
            <div id="nodes-render-zone"></div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let myLat = null, myLng = null;
        let myLocationMarker = null;
        let routingLine = null;
        let customTapMarker = null;
        let markersGroup = L.layerGroup();
        let loadedNodes = [];
        let activeLenses = {};

        function toggleHUDMenu() {
            document.getElementById('hudMenu').classList.toggle('active');
        }

        function initMapEngine() {
            map = L.map('map', { zoomControl: false }).setView([36.1912, 44.0091], 13);
            markersGroup.addTo(map);

            activeLenses.hybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains: ['mt0', 'mt1', 'mt2', 'mt3'] });
            activeLenses.streets = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains: ['mt0', 'mt1', 'mt2', 'mt3'] });
            activeLenses.dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 22 });

            const hour = new Date().getHours();
            if (hour >= 18 || hour < 6) {
                activeLenses.dark.addTo(map);
                document.getElementById('layer-select').value = "dark";
            } else {
                activeLenses.hybrid.addTo(map);
                document.getElementById('layer-select').value = "hybrid";
            }

            map.on('click', function(e) {
                const lat = e.latlng.lat;
                const lng = e.latlng.lng;

                document.getElementById('geo-lat').value = lat.toFixed(6);
                document.getElementById('geo-lng').value = lng.toFixed(6);
                document.getElementById('geo-name').value = `Coordinates: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;

                if (customTapMarker) {
                    customTapMarker.setLatLng([lat, lng]);
                } else {
                    customTapMarker = L.marker([lat, lng], { draggable: true }).addTo(map);
                }

                customTapMarker.bindPopup(`
                    <div style="color:#000; font-family:sans-serif; width:200px;">
                        <b style="color:var(--primary);">📍 Selected Location</b><br>
                        <span style="font-size:11px; color:#666;">Lat: ${lat.toFixed(4)}<br>Lng: ${lng.toFixed(4)}</span>
                        <input type="text" id="popup-name-input" placeholder="Change Label Name..." style="width:100%; margin-top:5px; padding:3px; font-size:11px;" oninput="updateMarkerLabel(this.value)">
                        <button onclick="triggerNavigationExecution()" style="margin-top:8px; background:#10b981; color:white; padding:5px; border-radius:4px; font-weight:bold; border:none; cursor:pointer; width:100%;">🚗 Route To Here</button>
                    </div>
                `).openPopup();
            });

            loadSavedWorkspace();
        }

        function updateMarkerLabel(val) {
            if(val.trim() !== "") {
                document.getElementById('geo-name').value = val;
            }
        }

        function alterMapLens() {
            const selected = document.getElementById('layer-select').value;
            Object.values(activeLenses).forEach(l => map.removeLayer(l));
            activeLenses[selected].addTo(map);
        }

        function appendSpatialNode(lat, lng, title) {
            const element = { lat, lng, title, uid: Date.now() + Math.random() };
            loadedNodes.push(element);
            saveWorkspaceToMemory();

            const m = L.marker([lat, lng]);
            m.bindPopup(`
                <div style="color:#000; font-family:sans-serif; padding:5px;">
                    <b style="color:var(--primary); font-size:13px;">📌 ${title}</b><br>
                    <button onclick="directRouteTrigger(${lat}, ${lng}, '${title.replace(/'/g, "\\'")}')" style="margin-top:8px; background:#10b981; color:white; padding:4px 8px; border-radius:4px; font-weight:bold; width:100%; border:none; cursor:pointer;">🚗 Route</button>
                </div>
            `);
            m.addTo(markersGroup);
            refreshHUDList();
        }

        function directRouteTrigger(lat, lng, title) {
            document.getElementById('geo-lat').value = lat;
            document.getElementById('geo-lng').value = lng;
            document.getElementById('geo-name').value = title;
            triggerNavigationExecution();
            if(window.innerWidth <= 768) toggleHUDMenu();
        }

        function refreshHUDList() {
            const box = document.getElementById('kml-list-box');
            const zone = document.getElementById('nodes-render-zone');
            if(loadedNodes.length === 0) { box.style.display = "none"; return; }
            box.style.display = "block";
            zone.innerHTML = loadedNodes.map(n => `
                <div class="kml-node-item" onclick="flyDirectToCoordinates(${n.lat}, ${n.lng}, '${n.title.replace(/'/g, "\\'")}')">
                    <span>🔹 ${n.title}</span>
                </div>
            `).join('');
        }

        function flyDirectToCoordinates(lat, lng, title) {
            document.getElementById('geo-lat').value = lat;
            document.getElementById('geo-lng').value = lng;
            document.getElementById('geo-name').value = title;
            map.flyTo([lat, lng], 17);
            if(window.innerWidth <= 768) toggleHUDMenu();
        }

        function captureMyLocation() {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser.");
                return;
            }
            document.getElementById('tel-status').innerText = "Scanning GPS...";
            
            navigator.geolocation.getCurrentPosition(pos => {
                myLat = pos.coords.latitude;
                myLng = pos.coords.longitude;
                document.getElementById('tel-status').innerText = "GPS Synced";

                const pulseIcon = L.divIcon({ className: 'custom-pulse', html: '<div class="gps-pulse"></div>', iconSize: [14, 14] });
                if (myLocationMarker) myLocationMarker.setLatLng([myLat, myLng]);
                else myLocationMarker = L.marker([myLat, myLng], { icon: pulseIcon }).addTo(map);
                
                map.flyTo([myLat, myLng], 15);
            }, (error) => {
                document.getElementById('tel-status').innerText = "GPS Failed";
                alert("🚨 ڕێگەپێدانی GPS ڕەتکراوەتەوە! تکایە لە سیتینگی برۆوسەرەکەت لۆکەیشن ئەلۆو بکە.");
            }, { enableHighAccuracy: true });
        }

        function triggerNavigationExecution() {
            const dLat = parseFloat(document.getElementById('geo-lat').value);
            const dLng = parseFloat(document.getElementById('geo-lng').value);
            const mode = document.getElementById('travel-mode').value;

            if (myLat === null || myLng === null) {
                alert("⚠️ تکایە سەرەتا دوگمەی 'Sync My Location GPS' دابگرە بۆ ئەوەی بزانین تۆ لەکوێیت!");
                return;
            }

            if (routingLine) map.removeLayer(routingLine);

            routingLine = L.polyline([[myLat, myLng], [dLat, dLng]], {
                color: mode === 'driving' ? '#06b6d4' : '#f59e0b',
                weight: 6, opacity: 0.9
            }).addTo(map);

            const distance = runHaversineCalculation(myLat, myLng, dLat, dLng);
            const bearing = runBearingCalculation(myLat, myLng, dLat, dLng);
            const speed = mode === 'driving' ? 60 : 5;
            const etaMinutes = (distance / speed) * 60;

            document.getElementById('tel-distance').innerText = `${distance.toFixed(2)} KM`;
            document.getElementById('tel-bearing').innerText = `${bearing.toFixed(0)}°`;
            document.getElementById('tel-eta').innerText = `${etaMinutes.toFixed(0)} Mins`;
            document.getElementById('tel-status').innerText = `Active Routing`;

            map.fitBounds(routingLine.getBounds(), { padding: [50, 50] });
            if(window.innerWidth <= 768 && document.getElementById('hudMenu').classList.contains('active')) toggleHUDMenu();
        }

        function parseBulkKML(event) {
            const file = event.target.files[0];
            if (!file) return;
            const r = new FileReader();
            r.onload = function(e) {
                const kml = e.target.result;
                const doc = new DOMParser().parseFromString(kml, "text/xml");
                const marks = doc.getElementsByTagName("Placemark");
                
                if(marks.length > 0) {
                    loadedNodes = [];
                    markersGroup.clearLayers();
                    for(let i=0; i<marks.length; i++) {
                        const name = marks[i].getElementsByTagName("name")[0]?.textContent || `Point #${i+1}`;
                        const cStr = marks[i].getElementsByTagName("coordinates")[0]?.textContent?.trim().split(",");
                        if(cStr && cStr.length >= 2) {
                            const lng = parseFloat(cStr[0]), lat = parseFloat(cStr[1]);
                            if(!isNaN(lat) && !isNaN(lng)) appendSpatialNode(lat, lng, name);
                        }
                    }
                    map.fitBounds(markersGroup.getBounds());
                }
            };
            r.readAsText(file);
        }

        function saveWorkspaceToMemory() {
            localStorage.setItem('map_nodes_data', JSON.stringify(loadedNodes));
        }

        function loadSavedWorkspace() {
            const saved = localStorage.getItem('map_nodes_data');
            if (saved) {
                const parsed = JSON.parse(saved);
                parsed.forEach(n => appendSpatialNode(n.lat, n.lng, n.title));
            } else {
                appendSpatialNode(36.1912, 44.0091, "Erbil HQ Terminal");
            }
        }

        function wipeCanvas() {
            markersGroup.clearLayers();
            loadedNodes = [];
            localStorage.removeItem('map_nodes_data');
            if(routingLine) map.removeLayer(routingLine);
            if(customTapMarker) map.removeLayer(customTapMarker);
            refreshHUDList();
        }

        function exportBulkKML() {
            if(loadedNodes.length === 0) return;
            let interior = loadedNodes.map(n => `<Placemark><name>${n.title}</name><Point><coordinates>${n.lng},${n.lat},0</coordinates></Point></Placemark>`).join('');
            const structure = `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>${interior}</Document></kml>`;
            const b = new Blob([structure], { type: 'application/vnd.google-earth.kml+xml' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(b); link.download = `Exported_Grid.kml`; link.click();
        }

        function runHaversineCalculation(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function runBearingCalculation(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const lat1Rad = lat1 * Math.PI / 180; const lat2Rad = lat2 * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2Rad);
            const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        window.onload = initMapEngine;
    </script>
</body>
</html>
